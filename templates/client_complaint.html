<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>VoiceVault - File Complaint</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(100, 180, 255, 0.15);
        }

        body {
            min-height: 100vh;
            background: #06111e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 12% 60%, rgba(20, 70, 200, 0.7), transparent 50%),
                radial-gradient(circle at 70% 35%, rgba(60, 20, 160, 0.55), transparent 50%),
                radial-gradient(circle at 88% 75%, rgba(0, 190, 215, 0.35), transparent 40%),
                linear-gradient(160deg, rgba(4, 10, 30, 0.5), rgba(8, 4, 20, 0.3));
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(90deg,
                    transparent, transparent 10px,
                    rgba(0, 180, 255, 0.012) 10px, rgba(0, 180, 255, 0.012) 11px);
            animation: scanlines 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes scanlines {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(100px);
            }
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 240px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            z-index: 100;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 24px 30px;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .brand-text {
            font-size: 18px;
            font-weight: 700;
        }

        .brand-sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .nav-section {
            padding: 20px 16px 8px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            position: relative;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #fff;
            background: rgba(59, 130, 246, 0.15);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, #3b82f6, #06b6d4);
            border-radius: 0 4px 4px 0;
        }

        .nav-item i {
            width: 18px;
            text-align: center;
        }

        .main {
            margin-left: 240px;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .page-header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.55);
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 32px;
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .form-group textarea {
            width: 100%;
            padding: 16px;
            min-height: 160px;
            resize: vertical;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group textarea:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.45);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .char-count {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            text-align: right;
            margin-top: 5px;
        }

        .btn-submit {
            padding: 14px 32px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.8), rgba(6, 182, 212, 0.8));
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-cancel {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            font-size: 14px;
            margin-left: 10px;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            background: rgba(248, 113, 113, 0.2);
            border: 1px solid rgba(248, 113, 113, 0.4);
            color: #fca5a5;
        }

        .alert.success {
            background: rgba(74, 222, 128, 0.2);
            border-color: rgba(74, 222, 128, 0.4);
            color: #86efac;
        }

        /* ── Mobile Responsive ── */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 300;
            width: 44px;
            height: 44px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            font-size: 22px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 150;
        }

        .sidebar-overlay.open {
            display: block;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .sidebar {
                transform: translateX(-260px);
                transition: transform 0.3s ease;
                z-index: 200;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0 !important;
                padding: 72px 16px 24px;
            }

            .page-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                    fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" />
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                    <line x1="12" y1="19" x2="12" y2="23" />
                    <line x1="8" y1="23" x2="16" y2="23" />
                </svg></div>
            <div>
                <div class="brand-text">VoiceVault</div>
                <div class="brand-sub">Client Portal</div>
            </div>
        </div>
        <span class="nav-section">Menu</span>
        <a href="/myapp/clienthome_get/" class="nav-item"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/myapp/client_complaint_get/" class="nav-item active"><i class="fa fa-comment-alt"></i> New
            Complaint</a>
        <a href="/myapp/client_view_complaints_get/" class="nav-item"><i class="fa fa-list"></i> My Complaints</a>
    </nav>

    <main class="main">
        <div class="page-header">
            <h1>File a Complaint</h1>
            <p>Describe your issue and we'll get back to you as soon as possible.</p>
        </div>

        {% for message in messages %}
        <div class="alert {% if message.tags == 'success' %}success{% endif %}">{{ message }}</div>
        {% endfor %}

        <div class="card">
            <form action="/myapp/client_complaint_post/" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Your Complaint</label>
                    <textarea name="complaint" id="complaintText" placeholder="Describe your issue in detail..."
                        maxlength="500" required></textarea>
                    <div class="char-count"><span id="charCount">0</span> / 500 characters</div>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="fa fa-paper-plane"></i> Submit Complaint
                </button>
                <a href="/myapp/clienthome_get/" class="btn-cancel">
                    <i class="fa fa-times"></i> Cancel
                </a>
            </form>
        </div>
    </main>

    <script>
        const ta = document.getElementById('complaintText');
        const cc = document.getElementById('charCount');
        ta.addEventListener('input', () => { cc.textContent = ta.value.length; });
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('open');
        }
    </script>
</body>

</html>
